server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: cloudcad-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cloudcad}
    username: ${DB_USERNAME:cloudcad}
    password: ${DB_PASSWORD:cloudcad_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    local-root: ${LOCAL_STORAGE_ROOT:.local/storage}
