name: cloudcad

services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudcad-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudcad}
      POSTGRES_USER: ${POSTGRES_USER:-cloudcad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudcad} -d ${POSTGRES_DB:-cloudcad}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cloudcad

  backend:
    image: cloudcad-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cloudcad-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cloudcad}
      DB_USERNAME: ${POSTGRES_USER:-cloudcad}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-1440}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      LOCAL_STORAGE_ROOT: /app/storage
    volumes:
      - backend-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - cloudcad

  frontend:
    image: cloudcad-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
    container_name: cloudcad-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - cloudcad

volumes:
  postgres-data:
  backend-storage:

networks:
  cloudcad:
    driver: bridge
